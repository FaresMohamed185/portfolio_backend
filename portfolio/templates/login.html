<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Fares Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0A0C10 0%, #1A1F2A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(26, 31, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 45px 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .logo h1 {
            color: #EFF1F3;
            font-size: 24px;
            font-weight: 600;
        }

        .logo p {
            color: #9CA3AF;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: #9CA3AF;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #13161C;
            border: 1px solid #2D3748;
            border-radius: 16px;
            color: #EFF1F3;
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3B82F6, #14B8A6);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            color: #F87171;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 25px;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .info-box {
            margin-top: 25px;
            padding: 15px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 14px;
            text-align: center;
        }

        .info-box p {
            color: #9CA3AF;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .info-box code {
            background: #0A0C10;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #3B82F6;
            font-family: monospace;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #6B7280;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: #3B82F6;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🔐</div>
            <h1>Admin Access</h1>
            <p>Enter your credentials to continue</p>
        </div>

        <!-- Flash messages simplified -->

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>
        </form>

        <div class="info-box">
            <p>🔑 Default Login Credentials</p>
            <code>Username: admin</code><br>
            <code>Password: admin123</code>
        </div>

        <a href="/" class="back-link">
            ← Back to Portfolio
        </a>
    </div>
</body>

</html>
